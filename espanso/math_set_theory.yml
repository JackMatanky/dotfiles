matches:
    # Sets
    - trigger: ":inset"
      replace: "∈"
    - trigger: ":notin"
      replace: "∉"
    - trigger: ":niset"
      replace: "∋"
    - trigger: ":notni"
      replace: "∌"
    - trigger: ":subset"
      replace: "⊂"
    - trigger: ":subseq"
      replace: "⊆"
    - trigger: ":supset"
      replace: "⊃"
    - trigger: ":supseq"
      replace: "⊇"
    - trigger: ":union"
      replace: "∪"
    - trigger: ":intersect"
      replace: "∩"
    # Misc
    - trigger: ":cong"
      replace: "≅"
    - trigger: ":sqrt"
      replace: "√"
    - trigger: ":approx"
      replace: "≈"
    - trigger: ":sum"
      replace: "∑"
    - trigger: ":integral"
      replace: "∫"
    - trigger: ":dagger"
      replace: "†"
