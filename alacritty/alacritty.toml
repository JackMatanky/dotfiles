[env]
TERM = "xterm-256color"
NU_CONFIG_DIR = "/Users/jack/.config/nushell"  # Path to Nushell config directory

[terminal.shell]
program = "/opt/homebrew/bin/nu" # "/bin/zsh"
args = ["--login"]
# args = ["--config-path", "/Users/jack/.config/nushell/config.nu", "--env-path", "/Users/jack/.config/nushell/env.nu", "--login"]

[font]
size = 15
[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[cursor]
style = "Beam"

[scrolling]
multiplier = 5

[selection]
save_to_clipboard = true

[colors.primary]
background = "0x282a36"
bright_foreground = "0xffffff"
foreground = "0xf8f8f2"

[colors.normal]
black = "0x21222C"
blue = "0xBD93F9"
cyan = "0x8BE9FD"
green = "0x50FA7B"
magenta = "0xFF79C6"
red = "0xFF5555"
white = "0xBFBFBF"
yellow = "0xF1FA8C"

[colors.bright]
black = "0x6272A4"
blue = "0xD6ACFF"
cyan = "0xA4FFFF"
green = "0x69FF94"
magenta = "0xFF92DF"
red = "0xFF6E6E"
white = "0xFFFFFF"
yellow = "0xFFFFA5"

[colors.cursor]
cursor = "0xf8f8f2"
text = "0x282a36"

[colors.footer_bar]
background = "0x282a36"
foreground = "0xf8f8f2"

[colors.hints.end]
background = "0x282a36"
foreground = "0xf1fa8c"

[colors.hints.start]
background = "0xf1fa8c"
foreground = "0x282a36"

[colors.search.focused_match]
background = "0xffb86c"
foreground = "0x44475a"

[colors.search.matches]
background = "0x50fa7b"
foreground = "0x44475a"

[colors.selection]
background = "#44475a"
text = "CellForeground"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "SearchForward"
key = "F"
mode = "~Search"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SearchBackward"
key = "B"
mode = "~Search"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "ClearLogNotice"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "f"
key = "L"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollLineUp"
key = "Up"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollLineDown"
key = "Down"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToTop"
key = "Home"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "End"
mode = "~Alt"
mods = "Shift"
