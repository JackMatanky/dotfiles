# Kubernetes Module
# [kubernetes]
# symbol = '☸ ' # Kubernetes symbol
# disabled = false # Enable Kubernetes context display
# detect_files = ['Dockerfile'] # Detect files in the current directory
# format = '[$symbol$context( \($namespace\))]($style)'
# contexts = [
#     { context_pattern = "", style = "green", context_alias = "omerxx", symbol = " " },
# ]

# Docker Context
[docker_context]
disabled = true # Disable Docker context detection

