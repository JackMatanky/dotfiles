# ~/.config/starship.toml
# Community Developed Catppuccin: https://github.com/nataziel/starship

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯ](fg:overlay1)\
$os\
$username\
$directory\
[оӮҙ](peach)\
$fill\
$cmd_duration\
[оӮ¶](yellow)\
$git_branch\
$git_status\
[оӮІ](fg:green bg:yellow)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮІ](fg:sapphire bg:green)\
$conda\
[оӮІ](fg:blue bg:sapphire)\
$shell\
[оӮІ](fg:lavender bg:blue)\
$battery\
$time
$character"""

palette = 'catppuccin_macchiato'

[line_break]
disabled = false

[os]
disabled = false
style = "bg:mauve fg:crust"
format = '[оӮ¶](fg:mauve)[$symbol ](bg:mauve fg:crust)[оӮ°](bg:red fg:mauve)'

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
Redhat = 'пҢ–'
RedHatEnterprise = 'пҢ–'
Solus = 'пҢӯ'
SUSE = 'пҢ”'
Ubuntu = 'пҢӣ'
Unknown = 'п„Ҳ'
Windows = 'оңҸ'

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = "[ пҖҮ ($user) ]($style)[оӮ°](bg:peach fg:red)"

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
home_symbol = "о¬Ҷ ~/"
truncation_symbol = '' #'оҜҹ '
truncation_length = 3
read_only = 'уұ§ө '
read_only_style = 'red'
use_os_path_sep = true

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "
"obsidian_vault" = "у°Ә¶ Obsidian "
"dotfiles" = "пҶ’ Dotfiles"
".config" = ".пҖ“ Config"

[fill]
symbol = ' '
# style = 'fg:current_line'
disabled = false

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " п„Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[shell]
format = '[ $indicator п’ү  ](fg:crust bg:blue)'
powershell_indicator = 'powershell'
fish_indicator = 'fish'
zsh_indicator = 'zsh'
nu_indicator = 'nu'
unknown_indicator = 'shell'
disabled = false

[time]
disabled = false
time_format = "%R"
# symbol = " пҗә "
style = "bg:lavender"
format = '[[ $time пҗә  ](fg:crust bg:lavender)]($style)[оӮҙ](fg:lavender)'

# [battery]
# format = "[ $percentage $symbol]($style)"
# full_symbol = "в–Ҳ"
# charging_symbol = "[вҶ‘](bold fg:green)"
# discharging_symbol = "вҶ“"
# unknown_symbol = "в–‘"
# empty_symbol = "в–ғ"

# [[battery.display]]
# threshold = 20
# style = "italic bold red"

# [[battery.display]]
# threshold = 60
# style = "italic dimmed bright-purple"

# [[battery.display]]
# threshold = 70
# style = "bold fg:yellow"

[character]
format = """
[в•°в”Җ$symbol](bold fg:overlay1) """
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[пҗҙ](bold fg:green)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:lavender)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:lavender)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:yellow)'
disabled = false

[cmd_duration]
show_milliseconds = true
format = "о«ҙ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

