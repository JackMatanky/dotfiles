# Base configuration from Omer Hamerman (GitHub: omerxx)
# Source: https://github.com/omerxx/dotfiles/blob/master/starship/starship.toml

# Starship Configuration for Nushell and Alacritty

# Disable automatic newline before prompt
add_newline = false

# Minimal left prompt configuration
format = """$directory$character"""

# Color palette configuration for Catppuccin Mocha
palette = "catppuccin_mocha"

# Move additional information to the right side
right_format = """$all"""

# Timeout for commands in milliseconds
command_timeout = 1000

# Directory configuration with custom substitutions
[directory]
substitutions = { '~/tests/starship-custom' = 'work-project' }
truncation_length = 3                                          # Limit directory segments
truncate_to_repo = true                                        # Truncate to the Git repository root

# Git Branch Module
[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
style = "bold yellow"                                # Highlight branch names
symbol = " "                                        # Custom branch symbol

# AWS Module for Cloud Profiles
# [aws]
# format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
# disabled = false
# style = 'bold blue'
# symbol = " "       # Custom AWS symbol

# GoLang Module
# [golang]
