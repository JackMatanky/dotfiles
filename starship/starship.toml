[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "bold fg:yellow"

[character]
format = """
[Ôò░ÔöÇ$symbol](bold fg:overlay1) """
