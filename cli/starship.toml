# ~/.config/starship.toml

# Inserts a blank line between prompts
add_newline = false

# Use the color palette
palette = "dracula"

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

# move the rest of the prompt to the right
right_format = """$all"""

[line_break]
disabled = true

[hostname]
style = "bold purple"
ssh_only = true
disabled = true
# format = "[$hostname]($style) "
# trim_at = "."

[username]
style_user = "bold yellow"
format = "[$user]($style_user) "
disabled = true
# show_always = true

# # Enable the use of emojis in the prompt
# [character] # Default prompt character
# success_symbol = "[вһң](bold green)"
# error_symbol = "[вң—](bold red)"

# [time]
# disabled = true
# # format = "[$time]($style) "
# # style = "yellow"
# # use_12hr = false

[battery]
full_symbol = 'рҹ”Ӣ '
charging_symbol = 'вҡЎпёҸ '
discharging_symbol = 'рҹ’Җ '
disabled = true
# format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = 'bold yellow'
discharging_symbol = 'рҹ’Ұ '

[[battery.display]]
threshold = 10
style = 'bold red'

