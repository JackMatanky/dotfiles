env.TERM = "xterm-256color"

[font]
size = 12
normal = { family = "Fira Code", style = "Regular" }
bold = { family = "Fira Code", style = "Bold" }
italic = { family = "Fira Code", style = "Italic" }
bold_italic = { family = "Fira Code", style = "Bold Italic" }
# draw_bold_text_with_bright_colors = true  # Uncomment if needed

[shell]
program = "/home/jack/.nix-profile/bin/nu"
args = ["--login"]

[keyboard]
bindings = [
  { key = "V",        mods = "Control|Shift", action = "Paste" },
  { key = "C",        mods = "Control|Shift", action = "Copy" },
  { key = "Paste",                            action = "Paste" },
  { key = "Copy",                             action = "Copy" },
  { key = "Insert",   mods = "Shift",         action = "PasteSelection" },
  { key = "F",        mods = "Control|Shift", action = "SearchForward",     mode = "~Search" },
  { key = "B",        mods = "Control|Shift", action = "SearchBackward",    mode = "~Search" },
  { key = "Key0",     mods = "Control",       action = "ResetFontSize" },
  { key = "Equals",   mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",    mods = "Control",       action = "DecreaseFontSize" },
  { key = "L",        mods = "Control",       action = "ClearLogNotice" },
  { key = "L",        mods = "Control",       chars  = "\f" },
  { key = "PageUp",   mods = "Shift",         action = "ScrollPageUp",      mode = "~Alt" },
  { key = "PageDown", mods = "Shift",         action = "ScrollPageDown",    mode = "~Alt" },
  { key = "Up",       mods = "Shift",         action = "ScrollLineUp",      mode = "~Alt" },
  { key = "Down",     mods = "Shift",         action = "ScrollLineDown",    mode = "~Alt" },
  { key = "Home",     mods = "Shift",         action = "ScrollToTop",       mode = "~Alt" },
  { key = "End",      mods = "Shift",         action = "ScrollToBottom",    mode = "~Alt" },
]

[scrolling]
multiplier = 5

[selection]
save_to_clipboard = true

[cursor]
style = "Beam"

[colors]
[colors.primary]
background = "0x282a36"
foreground = "0xf8f8f2"
bright_foreground = "0xffffff"

[colors.cursor]
text = "0x282a36"
cursor = "0xf8f8f2"

[colors.selection]
text = "CellForeground"
background = "#44475a"

[colors.normal]
black = "0x21222C"
red = "0xFF5555"
green = "0x50FA7B"
yellow = "0xF1FA8C"
blue = "0xBD93F9"
magenta = "0xFF79C6"
cyan = "0x8BE9FD"
white = "0xBFBFBF"

[colors.bright]
black = "0x6272A4"
red = "0xFF6E6E"
green = "0x69FF94"
yellow = "0xFFFFA5"
blue = "0xD6ACFF"
magenta = "0xFF92DF"
cyan = "0xA4FFFF"
white = "0xFFFFFF"

[colors.search]
[colors.search.matches]
foreground = "0x44475a"
background = "0x50fa7b"

[colors.search.focused_match]
foreground = "0x44475a"
background = "0xffb86c"

[colors.footer_bar]
background = "0x282a36"
foreground = "0xf8f8f2"

[colors.hints]
[colors.hints.start]
foreground = "0x282a36"
background = "0xf1fa8c"

[colors.hints.end]
foreground = "0xf1fa8c"
background = "0x282a36"
