# -----------------------------------------------------------------------------
# File: ${PROJECT_PATH}/jupytext.toml
# Description: Configuration for Jupytext notebook pairing
# JupyText Docs: https://jupytext.readthedocs.io/
# -----------------------------------------------------------------------------

# Pair .ipynb notebooks with .py scripts using the percent format (# %% - cell markers)
formats = "ipynb,py:percent"

# Strip all notebook metadata unless explicitly required (keeps files cleaner)
default_notebook_metadata_filter = "-all"

# Only retain 'tags' from cell metadata (e.g., for nbconvert or papermill)
default_cell_metadata_filter = "tags"
